<div class="page">
  <app-titulo [titulo]="cardapio?.titulo"></app-titulo>
  <div class="itens">
    <div *ngFor="let item of itens" class="item">
      <img [src]="item.imagem" alt="">
      <div class="descricao">
        <h5>{{ item.titulo }}</h5>
        <p>{{ item.descricao }}</p>
        <p>R$ {{ item.valor }}</p>
      </div>
    </div>
  </div>
</div>
