<div class="lista">
  <h1 class="titulo">{{ titulo }}</h1>
  <div class="cardapios">
    <app-cardapio
      *ngFor="let cardapio of cardapios"
      (click)="abrirCardapio(cardapio)"
      [imagem]="cardapio.imagem"
      [titulo]="cardapio.titulo"
      [endereco]="cardapio.endereco"
      [cidade]="cardapio.cidade"
      [telefone]="cardapio.telefone"
    ></app-cardapio>
  </div>
</div>
